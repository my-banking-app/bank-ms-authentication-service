name: CI/CD Pipeline - Production

on:
  pull_request:
    branches:
      - 'main'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      TAG: prod
      PROFILE: prod
      DB_NAME: prod_db
      DB_USER: prod_user
      DB_PASSWORD: prod_password
      PORT: 8082
      DB_PORT: 5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Log in to DockerHub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t camilobr89/auth-service:${{ env.TAG }} .
          docker push camilobr89/auth-service:${{ env.TAG }}

      - name: SSH and Deploy using Docker Compose
        uses: appleboy/ssh-action@v0.1.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export TAG=${{ env.TAG }}
            export PROFILE=${{ env.PROFILE }}
            export DB_NAME=${{ env.DB_NAME }}
            export DB_USER=${{ env.DB_USER }}
            export DB_PASSWORD=${{ env.DB_PASSWORD }}
            export PORT=${{ env.PORT }}
            export DB_PORT=${{ env.DB_PORT }}
            cd ../../.
            docker-compose pull
            docker-compose up -d
