name: CI/CD Pipeline - Staging

on:
  push:
    branches:
      - 'staging'
      - 'staging/**'
      - 'BANK-**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      TAG: staging # o 'prod' para producción
      PROFILE: staging # o 'prod' para producción
      DB_NAME: staging_db # o 'prod_db' para producción
      DB_USER: staging_user # o 'prod_user' para producción
      DB_PASSWORD: staging_password # o 'prod_password' para producción
      PORT: 8081 # o 8082 para producción
      DB_PORT: 5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Log in to DockerHub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t camilobr89/auth-service:${{ env.TAG }} .
          docker push camilobr89/auth-service:${{ env.TAG }}

      - name: SSH and Deploy using Docker Compose
        uses: appleboy/ssh-action@v0.1.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_PRIVATE_KEY }}
          script: |
            export TAG=${{ env.TAG }}
            export PROFILE=${{ env.PROFILE }}
            export DB_NAME=${{ env.DB_NAME }}
            export DB_USER=${{ env.DB_USER }}
            export DB_PASSWORD=${{ env.DB_PASSWORD }}
            export PORT=${{ env.PORT }}
            export DB_PORT=${{ env.DB_PORT }}
            cd ../../
            docker-compose pull
            docker-compose up -d
